name: Update Technologies

on:
  schedule:
    # Runs daily at 00:30 UTC (offset from the snake job so they don't collide)
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tech:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install PyGithub

      - name: Update technologies section
        env:
          # PAT with repo + read:user scope, stored as the GH_TOKEN repo secret.
          # Needed so the script can read languages across ALL your repos.
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/update_technologies.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update technologies section"
          file_pattern: README.md
