name: Generate Snake Animation

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    # Grants the action permission to push to the output branch
    permissions:
      contents: write

    steps:
      - name: Generate Snake files
        uses: Platane/snk@v3
        id: snake
        with:
          # Automatically uses the repository owner's username
          github_user_name: ${{ github.repository_owner }}
          # Optional: pass a PAT to also include PRIVATE contributions in the snake
          # github_token: ${{ secrets.GH_TOKEN }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          keep_files: false
